apiVersion: apps/v1
kind: Deployment

metadata:
  name: springboot-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: springboot-app

  template:
    metadata:
      labels:
        app: springboot-app

    spec:
      containers:
        - name: springboot-app

          image: production-devops-pipeline:latest

          imagePullPolicy: Never

          ports:
            - containerPort: 8082

          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql-service:3306/employee_db

            - name: SPRING_DATASOURCE_USERNAME  
              value: devops

            - name: SPRING_DATASOURCE_PASSWORD
              value: devops123